<!DOCTYPE html>
<html lang="en" data-theme="light" data-font-mode="editorial">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="shell">
      <header class="panel topbar">
        <div>
          <h1>Flashcard Maker</h1>
          <p>Create, organize, and study your flashcards by project.</p>
        </div>
        <div class="top-actions">
          <label class="font-control" for="font-mode">
            <span>Font</span>
            <select id="font-mode">
              <option value="editorial">Editorial</option>
              <option value="clean">Clean</option>
            </select>
          </label>
          <button id="theme-toggle" class="ghost" type="button">Dark mode</button>
          <button id="refresh-projects" class="ghost" type="button">Refresh</button>
          <button id="project-panel-toggle" class="ghost" type="button">Hide projects</button>
        </div>
      </header>

      <div class="workspace">
        <aside id="project-panel" class="panel project-panel">
          <div class="panel-header-row">
            <h2>Projects</h2>
          </div>

          <form id="new-project-form" class="stack">
            <label>
              Project name
              <input id="project-name" required maxlength="80" />
            </label>
            <label>
              Description (optional)
              <textarea id="project-description" maxlength="400"></textarea>
            </label>
            <button type="submit" class="primary">Add project</button>
          </form>

          <div id="project-list" class="project-list"></div>
        </aside>

        <main class="panel main-area">
          <div class="main-head">
            <div>
              <h2 id="active-project-title">Select a project</h2>
              <div id="stats" class="stats-row"></div>
            </div>
            <div class="mode-toggle" role="tablist" aria-label="App mode">
              <button id="mode-insert" class="mode-btn active" type="button" data-mode="insert">Insert</button>
              <button id="mode-study" class="mode-btn" type="button" data-mode="study">Study</button>
            </div>
          </div>

          <section id="insert-view" class="view-section">
            <form id="manual-card-form" class="stack card-form">
              <div class="form-head">
                <h3 id="card-form-title">Add flashcard</h3>
                <button id="cancel-edit" class="ghost hidden" type="button">Cancel edit</button>
              </div>

              <label>
                Question
                <textarea id="manual-question" required maxlength="600"></textarea>
              </label>
              <label>
                Definition
                <textarea id="manual-definition" required maxlength="3000"></textarea>
              </label>
              <label>
                Image (optional)
                <input id="manual-image" type="file" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif" />
              </label>
              <div id="form-image-preview-wrap" class="form-image-preview hidden">
                <img id="form-image-preview" alt="Card image preview" />
              </div>
              <label class="checkbox-row">
                <input id="clear-image-on-save" type="checkbox" />
                Remove existing image when saving
              </label>

              <button id="save-card-button" type="submit" class="primary">Save flashcard</button>
            </form>

            <div class="cards-list-head">
              <h3>Your flashcards</h3>
              <span id="cards-count" class="mono muted"></span>
            </div>
            <div id="cards-list" class="cards-list"></div>
          </section>

          <section id="study-view" class="view-section hidden">
            <div class="study-controls">
              <button id="start-session" class="primary" type="button">Start session</button>
              <button id="pause-session" class="ghost hidden" type="button">Pause session</button>
              <button id="resume-session" class="secondary hidden" type="button">Resume</button>
              <button id="end-session" class="ghost hidden" type="button">End session</button>
              <span id="study-progress" class="mono"></span>
            </div>

            <div id="study-empty" class="empty-message">Start a study session to review your flashcards.</div>

            <div id="study-stage" class="study-stage hidden">
              <div id="flip-card" class="flip-card" aria-live="polite">
                <div class="flip-card-inner">
                  <article class="flip-face front">
                    <p class="face-label">Question</p>
                    <p id="study-question" class="face-text"></p>
                  </article>
                  <article class="flip-face back">
                    <p class="face-label">Answer</p>
                    <p id="study-answer" class="face-text"></p>
                    <div id="study-image-wrap" class="study-image-wrap hidden">
                      <img id="study-image" alt="Flashcard diagram" />
                    </div>
                  </article>
                </div>
              </div>

              <div class="card-actions">
                <button id="flip-button" class="secondary" type="button">Flip card</button>
                <button id="prev-study" class="ghost" type="button">Prev</button>
                <button id="next-study" class="ghost" type="button">Next</button>
              </div>

              <div class="rating-row">
                <button id="mark-didnt-know" class="rating danger" type="button">Didn't know</button>
                <button id="mark-know" class="rating good" type="button">Know</button>
              </div>
            </div>

            <div id="study-summary" class="summary hidden">
              <h3 id="summary-title">Session summary</h3>
              <div id="summary-body"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <template id="project-item-template">
      <button class="project-item" type="button">
        <span class="project-title"></span>
        <span class="project-meta mono"></span>
      </button>
    </template>

    <template id="list-card-template">
      <article class="list-card">
        <div class="list-col">
          <p class="list-label">Question</p>
          <p class="list-text card-question"></p>
        </div>
        <div class="list-col">
          <p class="list-label">Answer</p>
          <p class="list-text card-answer"></p>
          <div class="list-image-wrap hidden">
            <img class="list-image" alt="Flashcard diagram" />
          </div>
        </div>
        <div class="list-side">
          <div class="status-chip"></div>
          <div class="list-actions">
            <button class="ghost edit-card" type="button">Edit</button>
            <button class="ghost delete-card" type="button">Delete</button>
          </div>
        </div>
      </article>
    </template>

    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>

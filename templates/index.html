<!DOCTYPE html>
<html lang="en" data-theme="light" data-font-mode="editorial">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard Maker | Project + Topic Flashcards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="aurora"></div>

    <div class="shell">
      <header class="panel topbar">
        <div>
          <h1>Flashcard Maker</h1>
          <p>Build and review flashcards by project and topic.</p>
        </div>
        <div class="top-actions">
          <label class="font-control" for="font-mode">
            <span>Font</span>
            <select id="font-mode">
              <option value="editorial">Editorial</option>
              <option value="clean">Clean</option>
            </select>
          </label>
          <button id="theme-toggle" class="ghost" type="button">Dark mode</button>
          <button id="refresh-projects" class="ghost" type="button">Refresh</button>
        </div>
      </header>

      <div class="layout">
        <aside class="panel sidebar">
          <section class="stack">
            <h2>Projects</h2>
            <form id="new-project-form" class="stack">
              <label>
                Project name
                <input id="project-name" required maxlength="80" />
              </label>
              <label>
                Description (optional)
                <textarea id="project-description" maxlength="400"></textarea>
              </label>
              <button type="submit" class="primary">Add project</button>
            </form>
            <div id="project-list" class="project-list"></div>
          </section>

          <section class="stack">
            <div class="label-row">
              <h2>Topics</h2>
              <span id="topics-caption" class="mono muted">Pick a project</span>
            </div>
            <form id="new-topic-form" class="inline-form">
              <input id="topic-name" maxlength="80" />
              <button type="submit" class="secondary">Add</button>
            </form>
            <div id="topic-list" class="topic-list"></div>
          </section>
        </aside>

        <main class="main-grid">
          <section class="panel compose">
            <div class="label-row">
              <h2 id="active-project-title">Select a project</h2>
              <div id="stats" class="stats-row"></div>
            </div>

            <form id="manual-card-form" class="stack">
              <label>
                Topic
                <select id="card-topic-select">
                  <option value="">No topic</option>
                </select>
              </label>
              <label>
                Question
                <textarea
                  id="manual-question"
                  required
                  maxlength="600"
                ></textarea>
              </label>
              <label>
                Definition
                <textarea
                  id="manual-definition"
                  required
                  maxlength="3000"
                ></textarea>
              </label>
              <button type="submit" class="primary">Save flashcard</button>
            </form>
          </section>

          <section class="panel study">
            <div class="label-row">
              <h2>Study mode</h2>
              <div class="filters">
                <button class="filter active" data-filter="all" type="button">All</button>
                <button class="filter" data-filter="dont_know" type="button">Don't know</button>
                <button class="filter" data-filter="kind_of_know" type="button">Kind of know</button>
                <button class="filter" data-filter="know" type="button">Know</button>
              </div>
            </div>

            <div class="study-toolbar">
              <label>
                Topic filter
                <select id="study-topic-filter">
                  <option value="all">All topics</option>
                </select>
              </label>
            </div>

            <div id="empty-study" class="empty-message">Add flashcards to start studying this project.</div>

            <div id="card-shell" class="card-shell hidden">
              <div class="card-meta">
                <span id="card-progress" class="mono"></span>
                <span id="card-topic-pill" class="pill">No topic</span>
              </div>

              <article class="flashcard">
                <h3>Question</h3>
                <p id="card-question"></p>

                <div id="definition-block" class="definition hidden">
                  <h3>Definition</h3>
                  <p id="card-definition"></p>
                </div>
              </article>

              <div class="card-actions">
                <button id="show-definition" class="secondary" type="button">Show definition</button>
                <button id="prev-card" class="ghost" type="button">Prev</button>
                <button id="next-card" class="ghost" type="button">Next</button>
              </div>

              <div class="rating-row">
                <button data-status="dont_know" class="rating danger" type="button">Don't know</button>
                <button data-status="kind_of_know" class="rating warn" type="button">Kind of know</button>
                <button data-status="know" class="rating good" type="button">Know</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <template id="project-item-template">
      <button class="project-item" type="button">
        <span class="project-title"></span>
        <span class="project-meta mono"></span>
      </button>
    </template>

    <template id="topic-chip-template">
      <span class="topic-chip"></span>
    </template>

    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
